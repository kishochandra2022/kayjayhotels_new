        margin-bottom: 1.5em; /* More vertical space */
      }
      .prose a {
        color: '#6A0DAD'; /* brand-primary (new purple) */
        text-decoration: underline;
        transition: color 0.2s;
      }
      .prose a:hover {
        color: '#4A0077'; /* brand-secondary (new darker purple) */
      }
      .prose ul, .prose ol {

      .prose ul { list-style-type: disc; }
      .prose ol { list-style-type: decimal; }

        color: #6B7280; /* Slightly darker gray for prose blockquote */
      }

        margin-top: 2.5em; /* More vertical space */
        margin-bottom: 2.5em;
        box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15), 0 4px 8px -2px rgba(0, 0, 0, 0.08); /* Slightly richer shadow */
